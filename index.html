<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audit Komisi Infarm — Shopee &amp; TikTok</title>
<!-- Cloud sharing fix v2: form-post + JSONP load/saveAction fallback -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
:root{
  --green:#34A853;--green-d:#2A8C44;--green-bg:#E9F6EC;--green-bg2:#DCF0E1;--green-tx:#1E6B36;
  --blue:#1FA2DB;--blue-bg:#E7F4FB;--blue-tx:#10729F;
  --shopee:#EE4D2D;--shopee-bg:#FDECE7;
  --tiktok:#16161A;--tiktok-bg:#EFEFF1;
  --amber-bg:#FBF1DC;--amber-tx:#8A5712;
  --red:#D64545;--red-bg:#FCEBEB;--red-tx:#A22C2C;
  --bg:#F4F7F2;--surface:#FFFFFF;--surface2:#FBFCFA;--topbar-bg:rgba(244,247,242,.85);
  --ink:#19251D;--ink2:#33433A;--mut:#6E7D72;--mut2:#9AA79E;
  --line:#E7ECE4;--line2:#D6DDD1;
  --radius:14px;--radius-sm:10px;
  --shadow:0 1px 2px rgba(25,45,30,.04),0 8px 24px -12px rgba(25,45,30,.10);
  --shadow-sm:0 1px 2px rgba(25,45,30,.05);
  --sans:"Plus Jakarta Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}
::selection{background:var(--green-bg2);}

/* ---------- App shell ---------- */
.app{display:flex;min-height:100vh;}
.side{width:256px;flex:none;background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
.brand{display:flex;align-items:center;gap:11px;padding:22px 20px 18px;}
.brand img{width:38px;height:38px;object-fit:contain;}
.brand .bt{font-size:15px;font-weight:800;letter-spacing:-.01em;line-height:1.1;}
.brand .bs{font-size:11px;color:var(--mut);font-weight:500;margin-top:1px;}
.navlbl{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mut2);padding:6px 22px;margin-top:6px;}
.nav{display:flex;flex-direction:column;gap:2px;padding:4px 12px;}
.nv{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--ink2);font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;text-align:left;width:100%;transition:.12s;}
.nv:hover{background:var(--surface2);color:var(--ink);}
.nv.on{background:var(--green-bg);color:var(--green-tx);}
.nv .ico{width:20px;height:20px;flex:none;display:flex;align-items:center;justify-content:center;}
.nv .ico svg{width:18px;height:18px;}
.nv .cbadge{margin-left:auto;font-size:11px;font-weight:700;background:var(--green-bg2);color:var(--green-tx);padding:1px 8px;border-radius:20px;font-family:var(--mono);}
.nv.on .cbadge{background:#fff;}
.nv .cbadge.alert{background:var(--red-bg);color:var(--red-tx);}
.side .foot{margin-top:auto;padding:16px 20px;border-top:1px solid var(--line);font-size:11px;color:var(--mut);}
.side .foot b{color:var(--ink2);font-weight:600;}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{display:flex;align-items:center;gap:14px;padding:20px 32px;border-bottom:1px solid var(--line);background:var(--topbar-bg);backdrop-filter:blur(8px);position:sticky;top:0;z-index:20;}
.topbar h1{font-size:20px;font-weight:800;margin:0;letter-spacing:-.02em;}
.topbar p{font-size:12.5px;color:var(--mut);margin:2px 0 0;}
.topbar .chip{margin-left:auto;display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--ink2);background:var(--surface);border:1px solid var(--line);border-radius:30px;padding:7px 14px;box-shadow:var(--shadow-sm);}
.topbar .chip .dot{width:7px;height:7px;border-radius:50%;background:var(--green);}
.topbar .chip.idle .dot{background:var(--mut2);}
.page{padding:28px 32px 64px;max-width:1240px;width:100%;}

/* ---------- Cards / generic ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:24px;margin-bottom:18px;box-shadow:var(--shadow-sm);}
.card h2{font-size:15px;margin:0 0 16px;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:8px;}
.card h2 .pi{width:24px;height:24px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
@media(max-width:880px){.grid2{grid-template-columns:1fr;}}
.hint{font-size:12px;color:var(--mut);margin:0;}
.sep{height:14px;}

.note{display:flex;gap:11px;background:var(--blue-bg);border:1px solid #C6E4F4;border-radius:var(--radius-sm);padding:14px 16px;font-size:13px;color:var(--blue-tx);margin-bottom:18px;line-height:1.55;}
.note .ni{flex:none;margin-top:1px;}
.note b{color:var(--blue-tx);}
.note.amber{background:var(--amber-bg);border-color:#F1D49B;color:var(--amber-tx);}
.note.amber b{color:var(--amber-tx);}

/* ---------- Dropzone ---------- */
.dz{border:1.5px dashed var(--line2);border-radius:var(--radius-sm);padding:22px 16px;text-align:center;cursor:pointer;transition:.15s;background:var(--surface2);}
.dz:hover{border-color:var(--green);background:var(--green-bg);}
.dz .ic{width:36px;height:36px;margin:0 auto 8px;border-radius:10px;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--mut);}
.dz .ic svg{width:19px;height:19px;}
.dz .lb{font-size:13px;font-weight:700;margin:0;}
.dz .sub{font-size:11.5px;color:var(--mut);margin:3px 0 0;}
.dz.loaded{border-style:solid;border-color:var(--green);background:var(--green-bg);}
.dz.loaded:hover{background:var(--green-bg2);}
.dz .ok{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--green-tx);font-weight:700;}
.dz .ok svg{width:17px;height:17px;}

.cs{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-top:14px;}
.cs label{display:block;font-size:11px;color:var(--mut);margin-bottom:5px;font-weight:600;}
select,.inp{width:100%;font-size:13px;padding:9px 11px;border:1px solid var(--line2);border-radius:9px;background:#fff;color:var(--ink);font-family:inherit;}
select:focus,.inp:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-bg);}
.cnt{font-size:12px;color:var(--green-tx);font-weight:600;margin:10px 0 0;}
.shsel{margin-bottom:10px;}
.shsel label{display:block;font-size:11px;color:var(--mut);font-weight:600;margin-bottom:5px;}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;font-size:13.5px;font-weight:700;border-radius:10px;cursor:pointer;border:1px solid transparent;padding:11px 18px;transition:.12s;white-space:nowrap;}
.btn svg{flex:none;}
.dashhd > .btn{flex:none;}
.btn svg{width:17px;height:17px;}
.btn-primary{background:var(--green);color:#fff;box-shadow:0 1px 2px rgba(42,140,68,.3);}
.btn-primary:hover{background:var(--green-d);}
.btn-ghost{background:#fff;color:var(--ink);border-color:var(--line2);}
.btn-ghost:hover{border-color:var(--mut2);background:var(--surface2);}
.btn-block{width:100%;padding:14px;font-size:15px;}
.run{width:100%;padding:15px;font-size:15px;font-weight:700;border:none;border-radius:11px;background:var(--green);color:#fff;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 2px 8px -2px rgba(42,140,68,.45);transition:.12s;}
.run:hover{background:var(--green-d);}
.run svg{width:19px;height:19px;}

/* ---------- Dashboard ---------- */
.dashhd{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px;}
.dashhd .ttl{font-size:18px;font-weight:800;letter-spacing:-.02em;margin:0;}
.dashhd .sub{font-size:12.5px;color:var(--mut);margin:3px 0 0;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px;}
@media(max-width:880px){.stats{grid-template-columns:repeat(2,1fr);}}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;}
.stat .icw{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
.stat .icw svg{width:20px;height:20px;}
.stat .v{font-size:34px;font-weight:800;letter-spacing:-.03em;font-family:var(--mono);line-height:1;}
.stat .l{font-size:12.5px;color:var(--mut);margin-top:6px;font-weight:600;}
.stat.click{cursor:pointer;transition:transform .12s,box-shadow .12s;}
.stat.click:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
.stat.click:active{transform:translateY(0);}
.plat .prow.click{cursor:pointer;border-radius:8px;margin:0 -8px;padding:11px 8px;transition:background .12s;}
.plat .prow.click:hover{background:var(--surface2);}
.stat .pct{font-size:11.5px;font-weight:700;margin-top:4px;}
.stat.tot .icw{background:var(--green-bg);color:var(--green-tx);}
.stat.ok .icw{background:var(--green-bg);color:var(--green-tx);}.stat.ok .v{color:var(--green-tx);}
.stat.prob .icw{background:var(--red-bg);color:var(--red-tx);}.stat.prob .v{color:var(--red-tx);}
.stat.warn .icw{background:var(--amber-bg);color:var(--amber-tx);}.stat.warn .v{color:var(--amber-tx);}

.health{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px 24px;margin-bottom:22px;box-shadow:var(--shadow-sm);}
.health .hh{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.health .hh .t{font-size:13.5px;font-weight:700;}
.health .hh .p{font-size:13.5px;font-weight:800;font-family:var(--mono);color:var(--green-tx);}
.bar{height:12px;border-radius:20px;background:var(--line);overflow:hidden;display:flex;}
.bar > i{display:block;height:100%;}
.bar .sok{background:var(--green);}
.bar .swarn{background:#E8B43B;}
.bar .sprob{background:var(--red);}
.barleg{display:flex;gap:18px;margin-top:12px;flex-wrap:wrap;}
.barleg span{font-size:12px;color:var(--mut);display:inline-flex;align-items:center;gap:7px;font-weight:600;}
.barleg span i{width:9px;height:9px;border-radius:3px;}

.platgrid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
@media(max-width:880px){.platgrid{grid-template-columns:1fr;}}
.plat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow-sm);}
.plat .ph{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.plat .pic{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#fff;flex:none;}
.plat .pic.sp{background:var(--shopee);}
.plat .pic.tk{background:var(--tiktok);}
.plat .pname{font-size:15px;font-weight:800;}
.plat .ptot{font-size:12px;color:var(--mut);font-weight:600;margin-top:1px;}
.plat .prow{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-top:1px solid var(--line);}
.plat .prow .ll{font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:9px;color:var(--ink2);}
.plat .prow .ll i{width:9px;height:9px;border-radius:3px;}
.plat .prow .vv{font-size:16px;font-weight:800;font-family:var(--mono);}
.plat .pbtn{margin-top:16px;}
.plat.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--mut);min-height:200px;}
.plat.empty svg{width:30px;height:30px;color:var(--mut2);margin-bottom:10px;}

/* onboarding (no audit yet) */
.welcome{background:linear-gradient(135deg,var(--green-bg) 0%,var(--surface2) 70%);border:1px solid var(--line);border-radius:var(--radius);padding:34px;margin-bottom:22px;display:flex;align-items:center;gap:22px;box-shadow:var(--shadow-sm);}
.welcome img{width:60px;height:60px;object-fit:contain;flex:none;}
.welcome h3{font-size:21px;font-weight:800;margin:0;letter-spacing:-.02em;}
.welcome p{font-size:13.5px;color:var(--ink2);margin:6px 0 0;max-width:560px;line-height:1.6;}
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:22px;}
@media(max-width:880px){.steps{grid-template-columns:1fr;}}
.step{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow-sm);cursor:pointer;transition:.14s;text-align:left;font-family:inherit;}
.step:hover{border-color:var(--green);transform:translateY(-2px);box-shadow:var(--shadow);}
.step .num{width:30px;height:30px;border-radius:9px;background:var(--green-bg);color:var(--green-tx);font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-family:var(--mono);}
.step .st{font-size:15px;font-weight:700;margin:0;}
.step .sd{font-size:12.5px;color:var(--mut);margin:5px 0 0;line-height:1.5;}
.step .more{font-size:12.5px;color:var(--green-tx);font-weight:700;margin-top:12px;display:inline-flex;align-items:center;gap:5px;}
.dstatus{display:flex;gap:14px;flex-wrap:wrap;}
.dsi{flex:1;min-width:200px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-sm);}
.dsi .dot{width:10px;height:10px;border-radius:50%;flex:none;}
.dsi .dot.on{background:var(--green);}.dsi .dot.off{background:var(--mut2);}
.dsi .dt{font-size:13px;font-weight:700;}
.dsi .dd{font-size:11.5px;color:var(--mut);margin-top:1px;}

/* ---------- Results toolbar / table ---------- */
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.pill{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;padding:9px 16px;border-radius:30px;border:1px solid var(--line2);background:#fff;cursor:pointer;color:var(--ink2);font-family:inherit;transition:.12s;}
.pill:hover{border-color:var(--mut2);}
.pill.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.pill.sp.on{background:var(--shopee);border-color:var(--shopee);}
.pill.tk.on{background:var(--tiktok);border-color:var(--tiktok);}
.fl{font-size:12.5px;font-weight:600;padding:7px 15px;border-radius:30px;border:1px solid var(--line2);background:#fff;cursor:pointer;color:var(--ink2);font-family:inherit;transition:.12s;}
.fl:hover{border-color:var(--mut2);}
.fl.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.qbox{font-size:13px;padding:9px 14px 9px 36px;border-radius:9px;border:1px solid var(--line2);background:#fff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="%236E7D72" stroke-width="2" stroke-linecap="round"><circle cx="7" cy="7" r="5"/><line x1="11" y1="11" x2="15" y2="15"/></svg>') 12px center no-repeat;font-family:inherit;color:var(--ink);min-width:230px;flex:1;max-width:340px;}
.qbox:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-bg);}
.fdiv{font-size:11.5px;color:var(--mut);margin-left:4px;align-self:center;font-weight:600;}
.sc{font-size:12px;font-weight:600;padding:6px 13px;border-radius:30px;border:1px solid var(--line2);background:#fff;cursor:pointer;color:var(--mut);font-family:inherit;}
.sc.on{background:var(--green-bg);color:var(--green-tx);border-color:var(--green-bg2);}

.tblwrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);}
.tblscroll{overflow-x:auto;max-height:560px;overflow-y:auto;}
table{width:100%;border-collapse:collapse;}
th{padding:11px 14px;font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--mut);border-bottom:1px solid var(--line);text-align:left;white-space:nowrap;position:sticky;top:0;background:var(--surface2);z-index:1;}
td{padding:11px 14px;font-size:12.5px;border-top:1px solid var(--line);vertical-align:top;}
tbody tr:hover td{background:var(--surface2);}
tr.prob td{background:var(--red-bg);}
tr.prob:hover td{background:#FAE0E0;}
.bdg{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:700;white-space:nowrap;}
.b-match{background:var(--green-bg);color:var(--green-tx);}
.b-mismatch,.b-tier{background:var(--red-bg);color:var(--red-tx);}
.b-warn{background:var(--amber-bg);color:var(--amber-tx);}
.b-gray{background:var(--tiktok-bg);color:var(--mut);}
.b-skip{background:var(--tiktok-bg);color:var(--mut);font-style:italic;}
.mono{font-family:var(--mono);font-size:12px;}
.tfoot{padding:12px 16px;font-size:12px;color:var(--mut);border-top:1px solid var(--line);background:var(--surface2);}
.empty{text-align:center;padding:60px 16px;color:var(--mut);}
.empty .eic{width:52px;height:52px;margin:0 auto 14px;border-radius:14px;background:var(--surface2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--mut2);}
.empty .eic svg{width:26px;height:26px;}
.empty p{margin:0 0 16px;font-size:14px;}
.ref{font-size:12px;color:var(--mut);}
.ref a{color:var(--red-tx);font-weight:600;text-decoration:none;}
.actbox{min-width:0;width:100%;min-height:72px;resize:vertical;border:1px solid var(--line2);border-radius:12px;padding:10px 11px;font-family:inherit;font-size:12.5px;line-height:1.45;background:#fff;color:var(--ink);box-shadow:inset 0 1px 0 rgba(0,0,0,.02);}
.actbox::placeholder{color:#8D988F;}
.actbox:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-bg),inset 0 1px 0 rgba(0,0,0,.02);}
.acttd{min-width:260px;}
.awrap{display:flex;flex-direction:column;gap:6px;min-width:0;}
.asave{font-size:10.5px;color:var(--mut);display:flex;align-items:center;gap:6px;min-height:14px;}
.asave:before{content:'';width:6px;height:6px;border-radius:50%;background:var(--mut2);display:inline-block;}
.asave.saving{color:var(--amber-tx);}.asave.saving:before{background:#E8B43B;}
.asave.saved{color:var(--green-tx);}.asave.saved:before{background:var(--green);}
.asave.fail{color:var(--red-tx);}.asave.fail:before{background:var(--red);}
.actempty{font-size:11px;color:var(--mut);background:var(--surface2);border:1px dashed var(--line2);border-radius:10px;padding:8px;text-align:center;}
.histrow{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px;box-shadow:var(--shadow-sm);}
.histrow .ht{font-weight:800;font-size:14px;}
.histrow .hs{font-size:12px;color:var(--mut);margin-top:2px;}
.cloudbox{background:var(--blue-bg);border:1px solid #C6E4F4;border-radius:var(--radius-sm);padding:12px 14px;font-size:12.5px;color:var(--blue-tx);margin-bottom:14px;}
.histdetail{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin:8px 0 16px;box-shadow:var(--shadow-sm);}
.histdetail .hdt{font-size:13px;font-weight:800;margin-bottom:3px;}
.histdetail .hds{font-size:12px;color:var(--mut);margin-bottom:12px;}
.histtabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.histtabs .pill{padding:7px 13px;font-size:12px;}
.histtable .tblscroll{max-height:560px;overflow:auto;}
.histtable table{table-layout:fixed;width:100%;min-width:760px!important;}
.histtable th{padding:8px 10px;font-size:9.5px;letter-spacing:.02em;background:#FBFCFA;}
.histtable td{padding:8px 10px;font-size:12px;vertical-align:top;}
.histtable tbody tr:hover td{background:#fff;}
.histtable .c-prod{width:230px;}.histtable .c-id{width:130px;}.histtable .c-met{width:170px;}.histtable .c-status{width:130px;}.histtable .c-act{width:230px;}
.hprod{min-width:0;}.hsku{font-family:var(--mono);font-weight:800;font-size:11.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.hname{font-size:11px;color:var(--mut);line-height:1.3;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}
.hsugg{font-size:10.5px;color:var(--amber-tx);line-height:1.25;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hpid{font-family:var(--mono);font-size:11px;white-space:nowrap;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;}
.hmetric{display:flex;flex-direction:column;gap:4px;max-width:100%;}
.hmetric .mline{display:flex;align-items:center;justify-content:space-between;gap:8px;line-height:1.18;background:var(--surface2);border:1px solid var(--line);border-radius:8px;padding:5px 7px;}
.hmetric .ml{font-size:10px;color:var(--mut);font-weight:700;}
.hmetric .mv{font-size:11.5px;font-weight:800;color:var(--ink2);font-family:var(--mono);text-align:right;}
.hmetric .mv.bad{color:var(--red-tx);}.hmetric .mv.ok{color:var(--green-tx);}
.hmetric .group{font-size:10px;font-weight:800;color:var(--green-tx);margin:1px 0 -1px;}
.hstatus{display:flex;flex-direction:column;gap:5px;align-items:flex-start;}
.hstatus .stline{display:flex;align-items:center;gap:6px;}.hstatus .stlbl{font-size:10px;font-weight:800;color:var(--mut);min-width:26px;}
.histtable .bdg{font-size:9.5px;padding:3px 7px;max-width:112px;overflow:hidden;text-overflow:ellipsis;}
.actmini{min-width:0;width:100%;min-height:66px;max-height:100px;font-size:11.5px;padding:8px 9px;resize:vertical;border-radius:10px;}
.histlegend{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:0 0 10px;color:var(--mut);font-size:11.5px;}
.histlegend b{color:var(--ink2);}.histlegend .dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
.syncnote{font-size:11.5px;color:var(--mut);margin-top:5px;}
@media(max-width:900px){.histtable table{min-width:760px!important;}.histtable .c-prod{width:210px}.histtable .c-id{width:120px}.histtable .c-act{width:220px}}

.subc{font-size:10px;color:var(--mut);margin-top:2px;}
.r-red{color:var(--red-tx);font-weight:700;}.r-grn{color:var(--green-tx);font-weight:600;}

/* rapikan kolom */
.cllist{max-height:380px;overflow:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:4px 16px;border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px;background:var(--surface2);}
.clitem{display:flex;align-items:center;gap:9px;font-size:12.5px;padding:5px 4px;cursor:pointer;border-radius:6px;}
.clitem:hover{background:#fff;}
.clitem span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.clitem input{flex:none;width:15px;height:15px;accent-color:var(--green);}

/* responsive sidebar */
@media(max-width:820px){
  .app{flex-direction:column;}
  .side{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--line);}
  .brand{padding:16px 18px 12px;}
  .navlbl{display:none;}
  .nav{flex-direction:row;flex-wrap:wrap;padding:0 12px 12px;}
  .nv{width:auto;}
  .nv .cbadge{margin-left:6px;}
  .side .foot{display:none;}
  .topbar{padding:16px 20px;}
  .page{padding:20px;}
}

/* ---------- Header filter dropdown (inline arrow) ---------- */
th .hf-wrap{display:inline-flex;align-items:center;gap:0;position:relative;cursor:pointer;}
th .hf-wrap select.hfilt{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;font-size:14px;}
th .hf-wrap .hf-arrow{display:inline-flex;align-items:center;margin-left:4px;color:var(--mut2);transition:.15s;}
th .hf-wrap .hf-arrow svg{width:13px;height:13px;}
th .hf-wrap.active .hf-arrow{color:var(--green-tx);}
th .hf-wrap.active{color:var(--green-tx);}

/* ---------- Tweakable: smooth feel transitions ---------- */
.card,.stat,.plat,.health,.topbar,.side,.dz,.nv,.btn,td,th{transition:background-color .25s ease,border-color .25s ease,padding .2s ease;}

/* ---------- Tweakable: DENSITY ---------- */

/* ---------- Tweakable: MOOD (surface atmosphere) ---------- */

function detectHeader(aoa){
  if(!aoa||!aoa.length)return [];
  var H=-1,i,row;
  for(i=0;i<Math.min(15,aoa.length);i++){row=aoa[i]||[];if(row.some(function(c){return String(c==null?'':c).trim().toLowerCase()==='sku';})){H=i;break;}}
  if(H<0){for(i=0;i<Math.min(15,aoa.length);i++){row=aoa[i]||[];if(row.some(function(c){return String(c==null?'':c).trim().toLowerCase().indexOf('sku')>-1;})){H=i;break;}}}
  if(H<0)H=0;
  var seen={};
  var hdr=(aoa[H]||[]).map(function(c,idx){var s=String(c==null?'':c).trim();if(s==='')s='kolom'+(idx+1);if(seen[s]){seen[s]++;s=s+' ('+seen[s]+')';}else seen[s]=1;return s;});
  var out=[];
  for(var r=H+1;r<aoa.length;r++){
    row=aoa[r]||[];
    var allEmpty=row.every(function(c){return String(c==null?'':c).trim()==='';});
    if(allEmpty)continue;
    var obj={};hdr.forEach(function(h,idx){obj[h]=(row[idx]==null?'':row[idx]);});
    out.push(obj);
  }
  return out;
}
function parseFile(file){return new Promise(function(ok,fail){
  var nm=file.name.toLowerCase();
  if(nm.slice(-4)==='.csv'){Papa.parse(file,{header:false,skipEmptyLines:true,complete:function(r){ok({names:['(CSV)'],sheets:{'(CSV)':detectHeader(r.data)}});},error:fail});}
  else{var rd=new FileReader();rd.onload=function(e){try{
    // PATCH 2026-07-09: baca Excel sebagai teks tampilan, bukan angka mentah.
    // Ini membantu Product ID panjang Shopee/TikTok tetap utuh saat cell di Excel diformat sebagai TEXT.
    var wb=XLSX.read(e.target.result,{type:'array',cellText:true,cellDates:false});
    var sheets={},names=[];
    wb.SheetNames.forEach(function(sn){
      var aoa=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:'',raw:false});
      sheets[sn]=detectHeader(aoa);names.push(sn);
    });
    ok({names:names,sheets:sheets});
  }catch(err){fail(err);}};rd.onerror=fail;rd.readAsArrayBuffer(file);}
});}

function applyActionToHistory(k,v){
  if(!S.hist||!S.hist.length)return;

    [['shopee','sp'],['tiktok','tk']].forEach(function(pair){
      var platform=pair[0],prop=pair[1];
      (h[prop]||[]).forEach(function(row){

var _actTimer={};
function actionSavedMark(k,state){

function syncActionInputs(k,v){
  try{
    var nodes=document.querySelectorAll('textarea[data-action-key]');
    nodes.forEach(function(n){
      if(n.getAttribute('data-action-key')===k && n.value!==v)n.value=v;
    });
  }catch(e){}

function setAction(k,v){
  v=v||'';
  if(!S.actions)S.actions={};
  S.actions[k]=v;
  saveActionsLocal();
  applyActionToHistory(k,v);
  saveHistoryLocal();
  syncActionInputs(k,v);
  actionSavedMark(k,'saving');
  if(_actTimer[k])clearTimeout(_actTimer[k]);

function normId(v){
  var s=String(v==null?'':v).trim();
  if(!s)return '';
  s=s.replace(/^['"`]+|['"`]+$/g,'').replace(/[\u00A0\s]/g,'');
  if(/^\d{1,3}(,\d{3})+$/.test(s))s=s.replace(/,/g,'');
  s=s.replace(/\.0+$/,'');
  return s;
}
function pairList(raw,skuCol,idCol){var out=[];raw.forEach(function(r){var sku=up(r[skuCol]);var pid=normId(r[idCol]);if(sku&&pid)out.push({pid:pid,sku:sku});});return out;}
function id2sku(list){var o={};list.forEach(function(p){o[p.pid]=p.sku;});return o;}
function id2skus(list){var o={};list.forEach(function(p){if(!o[p.pid])o[p.pid]=[];if(o[p.pid].indexOf(p.sku)===-1)o[p.pid].push(p.sku);});return o;}
function validPid(p){return /^\d{6,}$/.test(String(p||''));}
function uniqSku(list){var s={};list.forEach(function(p){s[p.sku]=1;});return Object.keys(s).length;}
function dupSku(list){var c={};list.forEach(function(p){c[p.sku]=(c[p.sku]||0)+1;});return Object.keys(c).filter(function(k){return c[k]>1;}).length;}
function bodyOf(sku){var i=sku.indexOf('-');return i>=0?sku.slice(i+1):sku;}
function buildBodyIdx(keys){var o={};keys.forEach(function(k){var b=bodyOf(k);if(!o[b])o[b]=[];o[b].push(k);});return o;}
function suggest(sku,bodyIdx){var c=bodyIdx[bodyOf(sku)]||[];return c.slice(0,2).join(' / ');}

}

}

/* ============ RENDER / NAV ============ */
function buildNav(){
  var el=document.getElementById('nav');if(!el)return;
  el.innerHTML=NAV.map(function(n){
    return '<button class="nv" id="nv-'+n.id+'" data-tab="'+n.id+'" onclick="sw('+(typeof n.id==='string'?'\''+n.id+'\'':n.id)+')"><span class="ico">'+IC[n.ic]+'</span>'+n.t+'<span class="cbadge" id="nvb-'+n.id+'" style="display:none"></span></button>';
  }).join('');
}
function updateNav(){
  NAV.forEach(function(n){var b=document.getElementById('nv-'+n.id);if(b)b.className='nv'+(n.id===S.tab?' on':'');});
  // result count badge
  var n=(S.resSp?S.resSp.length:0)+(S.resTk?S.resTk.length:0);
  var probN=0;if(S.resSp)probN+=statsOf(S.resSp).prob;if(S.resTk)probN+=statsOf(S.resTk).prob;
  var rb=document.getElementById('nvb-2');
  if(rb){if(n){rb.style.display='';rb.textContent=probN?probN:n;rb.className='cbadge'+(probN?' alert':'');}else rb.style.display='none';}
}
function updateTop(){
  var n=NAV.filter(function(x){return x.id===S.tab;})[0]||NAV[0];
  document.getElementById('pgTitle').innerHTML=n.t;
  document.getElementById('pgSub').innerHTML=n.sub;
  var chip=document.getElementById('auditChip'),txt=document.getElementById('chipTxt');
  if(S.summary){chip.className='chip';var dt=new Date(S.summary.ts);txt.textContent='Audit terakhir '+dt.toLocaleDateString('id-ID',{day:'numeric',month:'short'})+' '+dt.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});}
  else{chip.className='chip idle';txt.textContent='Belum ada audit';}
}

function rc(){var el=document.getElementById('content');if(!el)return;
  el.innerHTML=S.tab==='dash'?p_dash():S.tab===0?p0():S.tab===1?p1():S.tab===2?p2():S.tab==='hist'?pHist():p3();
  if(S.tab===0){if(S.src.ms)applySlot('ms');if(S.src.mt)applySlot('mt');rsvMap();}
  if(S.tab===1){['ls','sp','lt','tk'].forEach(function(id){if(S.src[id])applySlot(id);});}
  if(S.tab===3){if(S.src.cl){fillClSheet();var cle=document.getElementById('cl-list');if(cle)cle.innerHTML=buildClList();updateClCount();}}
  updateNav();updateTop();
  document.querySelector('.main').scrollTop=0;
}

function setRunWarn(msg){
  var wrn=document.getElementById('rw');
  if(wrn){wrn.style.display='block';wrn.textContent=msg;}
  else{alert(msg);}
}
function setMapMsg(msg,ok){
  var m=document.getElementById('map-msg');
  if(m){m.style.color=ok?'var(--green-tx)':'var(--red-tx)';m.textContent=msg;}
  else{alert(msg);}
}
function requireAuditCols(){
  var miss=[];
  if(S.spRaw.length){
    if(!S.mapSp.length)miss.push('Mapping Shopee belum disimpan');
    if(!S.lsRaw.length)miss.push('LAPB Shopee belum di-upload');
    else{if(!S.lsSku)miss.push('LAPB Shopee: kolom SKU');if(!S.lsComm)miss.push('LAPB Shopee: kolom Affiliate/Tier');}
    if(!S.spId)miss.push('Seller Center Shopee: kolom Product ID');
    if(!S.spComm)miss.push('Seller Center Shopee: kolom Komisi');
  }
  if(S.tkRaw.length){
    if(!S.mapTk.length)miss.push('Mapping TikTok belum disimpan');
    if(!S.ltRaw.length)miss.push('LAPB TikTok belum di-upload');
    else{if(!S.ltSku)miss.push('LAPB TikTok: kolom SKU');if(!S.ltComm)miss.push('LAPB TikTok: kolom Komisi Standart');if(!S.ltAds)miss.push('LAPB TikTok: kolom Komisi ADS');}
    if(!S.tkId)miss.push('Seller Center TikTok: kolom Product ID');
    if(!S.tkStd)miss.push('Seller Center TikTok: kolom Komisi Std');
    if(!S.tkAds)miss.push('Seller Center TikTok: kolom Komisi Ads');
  }
  if(miss.length){setRunWarn('Lengkapi data/kolom wajib dulu: '+miss.join(' · '));return false;}
  return true;
}

function defaultSheet(id,names){
  var plat=/^(ms|sp|ls)/.test(id)?'shop':(/^(mt|tk|lt)/.test(id)?'tik':'');
  if(plat){var m=names.filter(function(n){return n.toLowerCase().indexOf(plat)>-1;});if(m.length)return m[0];}
  var f=names.filter(function(n){return n.toLowerCase().indexOf('fix')>-1;});if(f.length)return f[0];
  return names[0];
}
function hFile(id,file){
  if(!file)return;
  parseFile(file).then(function(src){
    S.src[id]=src;
    src.sheet=defaultSheet(id,src.names);
    if(id==='cl'){S.clFile=file.name;S.clFilter='';clInitKeep();rc();return;}
    S[SLOT[id].file]=file.name;
    SLOT[id].cols.forEach(function(c){S[c[0]]='';});
    applySlot(id);
    var dzn=document.getElementById('dz-'+id);if(dzn)dzn.className='dz loaded';
    var el=document.getElementById('dzt-'+id);if(el)el.innerHTML='<div class="ok">'+IC.check+esc(file.name)+'</div>';
  }).catch(function(err){var e2=document.getElementById('dzt-'+id);if(e2)e2.innerHTML='<div style="color:var(--red-tx);font-size:12.5px;font-weight:600">Gagal: '+esc(err.message||err)+'</div>';});
}

function svMap(){
  var miss=[];
  if(S.msRaw.length&&(!S.msSku||!S.msId))miss.push('Shopee: pilih kolom SKU dan Product ID');
  if(S.mtRaw.length&&(!S.mtSku||!S.mtId))miss.push('TikTok: pilih kolom SKU dan Product ID');
  if(miss.length){setMapMsg('Lengkapi kolom wajib dulu: '+miss.join(' · '),false);return;}

function auditSC(sku,lapbTier,scKom,TIER,T2K,T2S,mode){
  var r={tier:(lapbTier===undefined?null:lapbTier),expKom:null,smp:null,act:scKom,status:'',tgtInv:false};
  if(!sku){r.status='no_sku';return r;}
  if(lapbTier===undefined){r.status='no_lapb';return r;}
  if(lapbTier==null){r.status='no_target';return r;}
  if(TIER.indexOf(lapbTier)===-1){r.tgtInv=true;r.status='target_invalid';return r;}
  if(scKom==null){r.status='no_comm';return r;}
  if(lapbTier===0){r.expKom=0;r.smp=0;if(scKom===0){r.status='skip_zero';return r;}else{r.status='mismatch';return r;}}
  r.expKom=T2K[lapbTier];r.smp=T2S[lapbTier];
  var target=(mode==='tier')?lapbTier:r.expKom;
  r.status=(Math.abs(target-scKom)<=0.01)?'match':'mismatch';
  return r;
}

function yn(v){var s=String(v==null?'':v).trim().toUpperCase();if(s==='YES'||s==='YA')return 'YES';if(s==='NO'||s==='TIDAK')return 'NO';return '';}
function actualWithFlag(r,pctCol,flagCol){
  var v=normC(r[pctCol]);
  var y=flagCol?yn(r[flagCol]):'';
  if(v==null&&y==='NO')return 0;
  if(v==null&&pctCol&&yn(r[pctCol])==='NO')return 0;
  return v;
}
function auditDirect(sku,target,actual){
  var r={tier:(target===undefined?null:target),expKom:(target===undefined?null:target),smp:null,act:actual,status:'',tgtInv:false};
  if(!sku){r.status='no_sku';return r;}
  if(target===undefined){r.status='no_lapb';return r;}
  if(target==null){r.status='no_target';return r;}
  if(actual==null){if(target===0){r.act=0;r.status='skip_zero';return r;}r.status='no_comm';return r;}
  if(target===0&&actual===0){r.status='skip_zero';return r;}
  r.status=(Math.abs(target-actual)<=0.01)?'match':'mismatch';
  return r;
}

    }finally{try{delete window[cb];}catch(e){window[cb]=null;}}

  var sc=document.createElement('script');sc.src=u+'?action=loadAll&callback='+cb+'&_='+(Date.now());sc.onerror=function(){try{delete window[cb];}catch(e){}};document.body.appendChild(sc);
}

/* ============ PAGE: RAPIKAN KOLOM ============ */
function p3(){
  if(!S.src.cl){
    return '<div class="note"><span class="ni">'+IC.info+'</span><div><b>Rapikan dulu Excel berantakan.</b> Upload file LAPB (Shopee atau TikTok), centang kolom yang mau dipertahankan, buang sisanya, lalu download versi rapinya. Header &amp; sheet terdeteksi otomatis.</div></div>'
    +'<div class="card"><h2><span class="pi" style="background:var(--green-bg);color:var(--green-tx)">'+IC.clean+'</span>Rapikan kolom Excel</h2>'+dz('cl','Upload Excel/CSV yang mau dirapikan','Berlaku untuk file Shopee maupun TikTok')+'</div>';
  }
  return '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;">'
    +'<h2 style="margin:0"><span class="pi" style="background:var(--green-bg);color:var(--green-tx)">'+IC.clean+'</span>Pilih kolom yang dipertahankan</h2>'
    +'<div><input type="file" id="fi-cl" accept=".xlsx,.xls,.csv" style="display:none" onchange="hFile(\'cl\',this.files[0])"><button class="btn btn-ghost" onclick="document.getElementById(\'fi-cl\').click()">Ganti file</button></div></div>'
    +'<p class="cnt" style="margin:0 0 14px">\u2713 '+esc(S.clFile)+'</p>'
    +'<div class="shsel" id="sh-cl"></div>'
    +'<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px;">'
    +'<input type="text" class="inp" placeholder="Cari kolom..." oninput="clFilterChange(this.value)" value="'+esc(S.clFilter||'')+'" style="flex:1;min-width:160px;">'
    +'<button class="btn btn-ghost" onclick="clAll(true)">Centang tampil</button>'
    +'<button class="btn btn-ghost" onclick="clAll(false)">Kosongkan tampil</button></div>'
    +'<div id="cl-list" class="cllist"></div>'
    +'<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-top:16px;">'
    +'<span id="cl-count" class="ref"></span>'
    +'<button class="btn btn-primary" onclick="clDownload()">'+IC.download+'Download Excel rapi</button></div></div>';
}
function fillClSheet(){var el=document.getElementById('sh-cl');if(!el)return;var src=S.src.cl;if(!src||src.names.length<=1){el.innerHTML='';return;}el.innerHTML='<label>Pilih sheet ('+src.names.length+' tersedia)</label><select onchange="clPickSheet(this.value)">'+src.names.map(function(n){return '<option'+(n===src.sheet?' selected':'')+'>'+esc(n)+'</option>';}).join('')+'</select>';}
function clInitKeep(){var rows=S.src.cl.sheets[S.src.cl.sheet]||[];var keys=gk(rows);S._clKeys=keys;S.clKeep={};keys.forEach(function(k){var lk=k.toLowerCase();S.clKeep[k]=['sku','affiliate','ads','komisi','kategori','produk','nama'].some(function(t){return lk.indexOf(t)>-1;});});}
function clPickSheet(name){if(!S.src.cl)return;S.src.cl.sheet=name;clInitKeep();S.clFilter='';rc();}
function buildClList(){var keys=S._clKeys||[];var flt=(S.clFilter||'').toLowerCase();var any=false;var h=keys.map(function(k,i){if(flt&&k.toLowerCase().indexOf(flt)===-1)return '';any=true;return '<label class="clitem"><input type="checkbox" '+(S.clKeep[k]?'checked':'')+' onchange="clToggle('+i+')"><span>'+esc(k)+'</span></label>';}).join('');return any?h:'<p class="ref" style="padding:8px">Tidak ada kolom cocok.</p>';}
function updateClCount(){var keys=S._clKeys||[];var sel=keys.filter(function(k){return S.clKeep[k];}).length;var el=document.getElementById('cl-count');if(el)el.textContent=sel+' dari '+keys.length+' kolom dipilih';}
function clToggle(i){var k=S._clKeys[i];if(k==null)return;S.clKeep[k]=!S.clKeep[k];updateClCount();}
function clFilterChange(v){S.clFilter=v;var el=document.getElementById('cl-list');if(el)el.innerHTML=buildClList();}
function clAll(val){var keys=S._clKeys||[];var flt=(S.clFilter||'').toLowerCase();keys.forEach(function(k){if(!flt||k.toLowerCase().indexOf(flt)>-1)S.clKeep[k]=val;});var el=document.getElementById('cl-list');if(el)el.innerHTML=buildClList();updateClCount();}
function clDownload(){var src=S.src.cl;if(!src)return;var rows=src.sheets[src.sheet]||[];var keep=(S._clKeys||[]).filter(function(k){return S.clKeep[k];});if(!keep.length){alert('Pilih minimal satu kolom.');return;}var out=rows.map(function(r){var o={};keep.forEach(function(k){o[k]=r[k];});return o;});var ws=XLSX.utils.json_to_sheet(out,{header:keep});var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Rapi');var base=(S.clFile||'data').replace(/\.[^.]+$/,'');XLSX.writeFile(wb,base+'-rapi.xlsx');}

/* ============ INIT ============ */
(function init(){
  try{var r=localStorage.getItem(LS);if(r){var o=JSON.parse(r);if(o&&!Array.isArray(o)){S.mapSp=o.sp||[];S.mapTk=o.tk||[];}}}catch(e){}
  try{var s=localStorage.getItem(LSUM);if(s){var so=JSON.parse(s);if(so&&so.ts)S.summary=so;}}catch(e){}
  try{var a=localStorage.getItem(LSA);if(a)S.actions=JSON.parse(a)||{};}catch(e){}
  try{var h=localStorage.getItem(LSH);if(h)S.hist=JSON.parse(h)||[];}catch(e){}
  buildNav();rc();cloudLoad();
})();
</script>

<div id="tweaks-root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": ["#34A853","#2A8C44","#E9F6EC","#DCF0E1","#1E6B36"],
  "density": "regular",
  "mood": "soft"
}/*EDITMODE-END*/;

// accent palette = [base, dark, light-bg, light-bg2, text]
const ACCENT_OPTIONS = [
  ["#34A853","#2A8C44","#E9F6EC","#DCF0E1","#1E6B36"], // Daun (Infarm)
  ["#1FA2DB","#1483B7","#E7F4FB","#D3EBF8","#10729F"], // Laut (Infarm biru)
  ["#0F9488","#0B746B","#E2F4F1","#CDEBE6","#0A5F57"], // Teal
  ["#E8803A","#CA6A2A","#FCEEE2","#F7DFC9","#9A5418"]  // Senja
];

function applyTweaks(t){
  const rs = document.documentElement.style;
  const A = (t.accent && t.accent.length === 5) ? t.accent : TWEAK_DEFAULTS.accent;
  rs.setProperty('--green', A[0]);
  rs.setProperty('--green-d', A[1]);
  rs.setProperty('--green-bg', A[2]);
  rs.setProperty('--green-bg2', A[3]);
  rs.setProperty('--green-tx', A[4]);
  document.body.setAttribute('data-density', t.density || 'regular');
  document.body.setAttribute('data-mood', t.mood || 'soft');
}
// Apply immediately so there is no flash before React mounts.
applyTweaks(TWEAK_DEFAULTS);

function Panel(){
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  React.useEffect(() => { applyTweaks(t); }, [t]);
  return (
    <TweaksPanel title="Tweaks">
      <TweakSection label="Warna aksen" />
      <TweakColor label="Aksen brand" value={t.accent} options={ACCENT_OPTIONS}
                  onChange={(v) => setTweak('accent', v)} />
      <TweakSection label="Tata letak" />
      <TweakRadio label="Kepadatan" value={t.density}
                  options={[{value:'compact',label:'Rapat'},{value:'regular',label:'Nyaman'},{value:'spacious',label:'Lega'}]}
                  onChange={(v) => setTweak('density', v)} />
      <TweakSection label="Suasana" />
      <TweakRadio label="Permukaan" value={t.mood}
                  options={[{value:'soft',label:'Soft'},{value:'crisp',label:'Bersih'},{value:'warm',label:'Hangat'}]}
                  onChange={(v) => setTweak('mood', v)} />
    </TweaksPanel>
  );
}
ReactDOM.createRoot(document.getElementById('tweaks-root')).render(<Panel />);
</script>
